<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蒋鹏鸭脖打卡</title>
<script src="https://unpkg.com/lucide@latest">
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #22c55e;
    --green-light: #dcfce7;
    --green-dark: #16a34a;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .app { width: 100%; max-width: 420px; }
  header { text-align: center; margin-bottom: 24px; }
  header .duck-icon { width: 72px; height: 72px; margin: 0 auto 8px; }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .today-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 32px 24px 28px;
    text-align: center;
    margin-bottom: 16px;
  }
  .today-date { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
  .today-weekday { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .checkin-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: none;
    background: var(--green);
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s, background .2s;
    box-shadow: 0 4px 14px rgba(34,197,94,.35);
    flex-direction: column;
  }
  .checkin-btn:hover { transform: scale(1.03); }
  .checkin-btn:active { transform: scale(.97); }
  .checkin-btn i { width: 32px; height: 32px; }
  .checkin-btn.done {
    background: var(--border);
    color: var(--text-secondary);
    box-shadow: none;
    cursor: default;
  }
  .checkin-btn.done:hover { transform: none; }
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 8px;
    text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: var(--green-dark); line-height: 1.2; }
  .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .cal-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 16px 16px;
    margin-bottom: 16px;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-header .month-label { font-size: 16px; font-weight: 600; }
  .cal-nav { display: flex; gap: 4px; }
  .cal-nav button {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 6px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: background .15s;
  }
  .cal-nav button:hover { background: var(--bg); }
  .cal-nav button i { width: 18px; height: 18px; }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .cal-weekdays span { padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    position: relative;
    transition: background .15s;
  }
  .cal-day.other-month { color: #cbd5e1; }
  .cal-day.today { background: var(--green-light); font-weight: 700; color: var(--green-dark); }
  .cal-day .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    position: absolute;
    bottom: 4px;
  }
  .cal-day.today .dot { background: var(--green-dark); }
  .history-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
  }
  .history-card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .history-card h3 i { width: 18px; height: 18px; color: var(--text-secondary); }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 210px;
    overflow-y: auto;
  }
  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 8px;
  }
  .history-item .date { font-weight: 500; }
  .history-item .time { color: var(--text-secondary); font-size: 12px; }
  .history-empty { text-align: center; color: var(--text-secondary); font-size: 13px; padding: 24px 0; }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b;
    color: #fff;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: transform .35s cubic-bezier(.22,.68,0,1), opacity .35s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY = 'checkin_data';
const WEEKDAYS = ['日','一','二','三','四','五','六'];
const MONTHS   = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
let state = loadState();
let calMonth = new Date().getMonth();
let calYear  = new Date().getFullYear();
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return { records: {} };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateLabel(key) {
  const [y,m,d] = key.split('-').map(Number);
  return `${y}年${m}月${d}日`;
}
function isToday(key) { return key === todayKey(); }
function getNowTime() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function calcStats() {
  const keys = Object.keys(state.records).sort().reverse();
  const total = keys.length;
  let streak = 0;
  const today = new Date();
  let cursor = isToday(keys[0] || '') ? new Date() : new Date(today);
  if (!isToday(keys[0] || '')) cursor.setDate(cursor.getDate() - 1);
  while (true) {
    const k = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
    if (state.records[k]) { streak++; cursor.setDate(cursor.getDate() - 1); }
    else break;
  }
  const ym = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const thisMonth = keys.filter(k => k.startsWith(ym)).length;
  return { total, streak, thisMonth };
}
function renderCalendar() {
  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth + 1, 0);
  const startPad = first.getDay();
  const daysInMonth = last.getDate();
  const cells = [];
  const prevLast = new Date(calYear, calMonth, 0);
  for (let i = startPad - 1; i >= 0; i--) cells.push({ day: prevLast.getDate() - i, other: true });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, other: false });
  while (cells.length < 42) {
    const nextDay = cells.length - startPad - daysInMonth + 1;
    cells.push({ day: nextDay, other: true });
  }
  const today = new Date();
  const todayY = today.getFullYear(), todayM = today.getMonth(), todayD = today.getDate();
  let html = '';
  cells.forEach(c => {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const checked = !!state.records[key];
    const isT = !c.other && calYear === todayY && calMonth === todayM && c.day === todayD;
    let cls = 'cal-day';
    if (c.other) cls += ' other-month';
    if (isT) cls += ' today';
    html += `<div class="${cls}">${c.day}${checked ? '<div class="dot"></div>' : ''}</div>`;
  });
  document.getElementById('cal-grid').innerHTML = html;
  document.getElementById('cal-label').textContent = `${calYear}年 ${MONTHS[calMonth]}`;
}
function renderHistory() {
  const list = document.getElementById('history-list');
  const keys = Object.keys(state.records).sort().reverse().slice(0, 50);
  if (keys.length === 0) {
    list.innerHTML = '<div class="history-empty">还没有打卡记录，开始今天第一次打卡吧</div>';
    return;
  }
  let html = '';
  keys.forEach(k => {
    html += `<div class="history-item"><span class="date">${formatDateLabel(k)}</span><span class="time">${state.records[k]}</span></div>`;
  });
  list.innerHTML = html;
}
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
function handleCheckin() {
  const key = todayKey();
  if (state.records[key]) {
    showToast('今天已经打过卡啦');
    return;
  }
  state.records[key] = getNowTime();
  saveState();
  renderAll();
  showToast('打卡成功');
}
function renderAll() {
  const stats = calcStats();
  const key = todayKey();
  const checked = !!state.records[key];
  const today = new Date();
  document.getElementById('app').innerHTML = `
    <header>
      <div class="duck-icon">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="48" fill="#FFF7E6"/>
          <ellipse cx="50" cy="62" rx="26" ry="18" fill="#FFD43B"/>
          <circle cx="50" cy="40" r="22" fill="#FFD43B"/>
          <circle cx="40" cy="36" r="2.5" fill="#1A1A1A"/>
          <circle cx="60" cy="36" r="2.5" fill="#1A1A1A"/>
          <ellipse cx="48" cy="34" rx="1.5" ry="1" fill="#FF8C00" opacity="0.6"/>
          <ellipse cx="62" cy="34" rx="1.5" ry="1" fill="#FF8C00" opacity="0.6"/>
          <path d="M54 42 Q56 46 50 46 Q44 46 46 42" stroke="#1A1A1A" fill="#FF6B6B" stroke-width="0.8"/>
          <path d="M68 38 Q72 30 74 32 Q76 34 70 40" fill="#FF8C00"/>
          <path d="M32 50 Q28 55 24 52 Q20 49 24 46" fill="#FFD43B" stroke="#F0C000" stroke-width="0.5"/>
          <path d="M68 50 Q72 55 76 52 Q80 49 76 46" fill="#FFD43B" stroke="#F0C000" stroke-width="0.5"/>
          <path d="M38 66 Q42 72 50 74 Q58 72 62 66" fill="#FFD43B" stroke="#F0C000" stroke-width="0.5"/>
          <text x="50" y="87" text-anchor="middle" font-size="9" font-weight="700" fill="#FF8C00">鸭脖</text>
        </svg>
      </div>
      <h1>蒋鹏鸭脖打卡</h1>
      <p>坚持每天打卡，鸭脖自由不是梦</p>
    </header>
    <div class="today-card">
      <div class="today-date">${today.getFullYear()} 年 ${today.getMonth()+1} 月 ${today.getDate()} 日</div>
      <div class="today-weekday">星期${WEEKDAYS[today.getDay()]}</div>
      <button class="checkin-btn${checked ? ' done' : ''}" id="btn-checkin">
        ${checked ? '<i data-lucide="check-circle-2"></i>已打卡' : '<i data-lucide="target"></i>打卡'}
      </button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="num">${stats.total}</div><div class="label">总打卡</div></div>
      <div class="stat-card"><div class="num">${stats.streak}</div><div class="label">连续天数</div></div>
      <div class="stat-card"><div class="num">${stats.thisMonth}</div><div class="label">本月打卡</div></div>
    </div>
    <div class="cal-card">
      <div class="cal-header">
        <span class="month-label" id="cal-label"></span>
        <div class="cal-nav">
          <button id="cal-prev"><i data-lucide="chevron-left"></i></button>
          <button id="cal-next"><i data-lucide="chevron-right"></i></button>
        </div>
      </div>
      <div class="cal-weekdays">${WEEKDAYS.map(w => '<span>'+w+'</span>').join('')}</div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="history-card">
      <h3><i data-lucide="clock-9"></i>打卡记录</h3>
      <div class="history-list" id="history-list"></div>
    </div>
  `;
  renderCalendar();
  renderHistory();
  lucide.createIcons();
  document.getElementById('btn-checkin').addEventListener('click', handleCheckin);
  document.getElementById('cal-prev').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
  document.getElementById('cal-next').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });
}
renderAll();
</script>
</body>
</html>
